<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💡 IdeaVault - 创意管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #eaeaea; min-height: 100vh; }
        
        header { background: linear-gradient(135deg, #16213e 0%, #1a1a2e 100%); padding: 30px; text-align: center; border-bottom: 1px solid #0f3460; }
        header h1 { background: linear-gradient(135deg, #e94560, #0f3460); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 2rem; }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 30px; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat { background: #16213e; padding: 20px; border-radius: 12px; text-align: center; border: 1px solid #0f3460; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #e94560; }
        .stat-label { color: #888; margin-top: 5px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .tab { background: #16213e; border: 1px solid #0f3460; padding: 12px 24px; border-radius: 8px; cursor: pointer; }
        .tab.active { background: #e94560; border-color: #e94560; }
        
        .section { display: none; }
        .section.active { display: block; }
        
        /* Ideas Grid */
        .ideas-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .idea-card { background: #16213e; border-radius: 12px; padding: 20px; border: 1px solid #0f3460; transition: all 0.3s; }
        .idea-card:hover { transform: translateY(-5px); border-color: #e94560; box-shadow: 0 10px 30px rgba(233, 69, 96, 0.2); }
        
        .idea-title { font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; color: #eaeaea; }
        .idea-desc { color: #aaa; margin-bottom: 15px; line-height: 1.6; }
        .idea-meta { display: flex; justify-content: space-between; align-items: center; }
        .idea-tag { background: #0f3460; padding: 4px 12px; border-radius: 15px; font-size: 0.75rem; color: #e94560; }
        .idea-date { color: #666; font-size: 0.8rem; }
        
        .idea-actions { display: flex; gap: 10px; margin-top: 15px; }
        .idea-btn { flex: 1; background: #0f3460; border: none; padding: 10px; border-radius: 6px; color: #eaeaea; cursor: pointer; }
        .idea-btn:hover { background: #e94560; }
        
        /* Add Form */
        .add-form { background: #16213e; border-radius: 12px; padding: 25px; margin-bottom: 25px; border: 1px solid #0f3460; }
        .add-form input, .add-form textarea, .add-form select { width: 100%; background: #1a1a2e; border: 1px solid #0f3460; padding: 12px; border-radius: 8px; color: #eaeaea; margin-bottom: 15px; }
        .add-form input:focus, .add-form textarea:focus { outline: none; border-color: #e94560; }
        
        /* Kanban */
        .kanban { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .kanban-col { background: #16213e; border-radius: 12px; padding: 20px; min-height: 400px; }
        .kanban-title { font-size: 1rem; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid; }
        .kanban-title.todo { border-color: #f39c12; }
        .kanban-title.progress { border-color: #3498db; }
        .kanban-title.done { border-color: #27ae60; }
        
        /* Tags Filter */
        .tags-filter { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .tag-btn { background: #16213e; border: 1px solid #0f3460; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
        .tag-btn.active { background: #e94560; border-color: #e94560; }
        
        /* Empty */
        .empty { text-align: center; padding: 60px; color: #666; }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2, 1fr); }
            .kanban { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <header>
        <h1>💡 IdeaVault</h1>
        <p>管理你的每一个创意灵感</p>
    </header>
    
    <div class="container">
        <!-- Stats -->
        <div class="stats">
            <div class="stat"><div class="stat-value" id="totalIdeas">0</div><div class="stat-label">总创意</div></div>
            <div class="stat"><div class="stat-value" id="todoCount">0</div><div class="stat-label">计划中</div></div>
            <div class="stat"><div class="stat-value" id="progressCount">0</div><div class="stat-label">进行中</div></div>
            <div class="stat"><div class="stat-value" id="doneCount">0</div><div class="stat-label">已完成</div></div>
        </div>
        
        <!-- Tabs -->
        <div class="tabs">
            <div class="tab active" onclick="showTab('ideas')">💡 所有创意</div>
            <div class="tab" onclick="showTab('kanban')">📋 看板</div>
            <div class="tab" onclick="showTab('add')">➕ 添加</div>
        </div>
        
        <!-- Ideas List -->
        <div id="ideas" class="section active">
            <div class="tags-filter" id="tagsFilter"></div>
            <div class="ideas-grid" id="ideasGrid"></div>
        </div>
        
        <!-- Kanban -->
        <div id="kanban" class="section">
            <div class="kanban">
                <div class="kanban-col">
                    <div class="kanban-title todo">📝 计划中</div>
                    <div id="kanbanTodo"></div>
                </div>
                <div class="kanban-col">
                    <div class="kanban-title progress">🔄 进行中</div>
                    <div id="kanbanProgress"></div>
                </div>
                <div class="kanban-col">
                    <div class="kanban-title done">✅ 已完成</div>
                    <div id="kanbanDone"></div>
                </div>
            </div>
        </div>
        
        <!-- Add Form -->
        <div id="add" class="section">
            <div class="add-form">
                <h3 style="margin-bottom:20px">➕ 添加新创意</h3>
                <input type="text" id="ideaTitle" placeholder="创意标题">
                <textarea id="ideaDesc" placeholder="详细描述..." rows="4"></textarea>
                <select id="ideaStatus">
                    <option value="todo">📝 计划中</option>
                    <option value="progress">🔄 进行中</option>
                    <option value="done">✅ 已完成</option>
                </select>
                <input type="text" id="ideaTags" placeholder="标签 (逗号分隔)">
                <button onclick="addIdea()" style="width:100%;background:#e94560;border:none;padding:15px;border-radius:8px;color:white;font-size:1rem">保存创意</button>
            </div>
        </div>
    </div>
    
    <script>
        // Data
        let data = JSON.parse(localStorage.getItem('ideavault') || '{"ideas":[],"currentTag":""}');
        let currentTag = data.currentTag || '';
        
        // Init
        renderIdeas();
        renderKanban();
        renderTags();
        updateStats();
        
        function saveData() {
            data.currentTag = currentTag;
            localStorage.setItem('ideavault', JSON.stringify(data));
        }
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelector(`.tab[onclick="showTab('${tab}')"]`).classList.add('active');
            document.getElementById(tab).classList.add('active');
        }
        
        function updateStats() {
            const ideas = data.ideas;
            document.getElementById('totalIdeas').textContent = ideas.length;
            document.getElementById('todoCount').textContent = ideas.filter(i => i.status === 'todo').length;
            document.getElementById('progressCount').textContent = ideas.filter(i => i.status === 'progress').length;
            document.getElementById('doneCount').textContent = ideas.filter(i => i.status === 'done').length;
        }
        
        // Render Ideas
        function renderIdeas() {
            let ideas = data.ideas;
            
            if (currentTag) {
                ideas = ideas.filter(i => i.tags.includes(currentTag));
            }
            
            const grid = document.getElementById('ideasGrid');
            if (!ideas.length) {
                grid.innerHTML = '<div class="empty">还没有创意，去添加一个吧！</div>';
                return;
            }
            
            grid.innerHTML = ideas.map(i => `
                <div class="idea-card">
                    <div class="idea-title">${i.title}</div>
                    <div class="idea-desc">${i.desc}</div>
                    <div class="idea-meta">
                        <span class="idea-tag">${i.tags.join(', ') || '无标签'}</span>
                        <span class="idea-date">${new Date(i.created).toLocaleDateString()}</span>
                    </div>
                    <div class="idea-actions">
                        <button class="idea-btn" onclick="editIdea(${i.id})">✏️ 编辑</button>
                        <button class="idea-btn" onclick="deleteIdea(${i.id})">🗑️ 删除</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Kanban
        function renderKanban() {
            const statuses = ['todo', 'progress', 'done'];
            const titles = { todo: 'kanbanTodo', progress: 'kanbanProgress', done: 'kanbanDone' };
            
            statuses.forEach(status => {
                const col = document.getElementById(titles[status]);
                const ideas = data.ideas.filter(i => i.status === status);
                
                if (!ideas.length) {
                    col.innerHTML = '<div class="empty">暂无</div>';
                    return;
                }
                
                col.innerHTML = ideas.map(i => `
                    <div class="idea-card" style="margin-bottom:15px">
                        <div class="idea-title">${i.title}</div>
                        <div class="idea-desc">${i.desc.substring(0, 80)}${i.desc.length > 80 ? '...' : ''}</div>
                        <div style="display:flex;gap:5px;margin-top:10px">
                            ${i.tags.slice(0, 2).map(t => `<span class="idea-tag">${t}</span>`).join('')}
                        </div>
                    </div>
                `).join('');
            });
        }
        
        // Tags
        function renderTags() {
            const allTags = [...new Set(data.ideas.flatMap(i => i.tags))];
            const filter = document.getElementById('tagsFilter');
            
            filter.innerHTML = `
                <button class="tag-btn ${!currentTag ? 'active' : ''}" onclick="filterTag('')">全部</button>
                ${allTags.map(t => `
                    <button class="tag-btn ${currentTag === t ? 'active' : ''}" onclick="filterTag('${t}')">${t}</button>
                `).join('')}
            `;
        }
        
        function filterTag(tag) {
            currentTag = tag;
            saveData();
            renderTags();
            renderIdeas();
        }
        
        // Add Idea
        function addIdea() {
            const title = document.getElementById('ideaTitle').value.trim();
            const desc = document.getElementById('ideaDesc').value.trim();
            const status = document.getElementById('ideaStatus').value;
            const tags = document.getElementById('ideaTags').value.split(',').map(t => t.trim()).filter(t => t);
            
            if (!title) { alert('请输入标题'); return; }
            
            data.ideas.unshift({
                id: Date.now(),
                title,
                desc,
                status,
                tags,
                created: new Date().toISOString()
            });
            
            document.getElementById('ideaTitle').value = '';
            document.getElementById('ideaDesc').value = '';
            document.getElementById('ideaTags').value = '';
            
            saveData();
            renderIdeas();
            renderKanban();
            renderTags();
            updateStats();
            showTab('ideas');
        }
        
        function editIdea(id) {
            const idea = data.ideas.find(i => i.id === id);
            if (!idea) return;
            
            document.getElementById('ideaTitle').value = idea.title;
            document.getElementById('ideaDesc').value = idea.desc;
            document.getElementById('ideaStatus').value = idea.status;
            document.getElementById('ideaTags').value = idea.tags.join(', ');
            
            data.ideas = data.ideas.filter(i => i.id !== id);
            saveData();
            renderIdeas();
            renderKanban();
            updateStats();
            showTab('add');
        }
        
        function deleteIdea(id) {
            if (!confirm('确定删除这个创意吗？')) return;
            data.ideas = data.ideas.filter(i => i.id !== id);
            saveData();
            renderIdeas();
            renderKanban();
            renderTags();
            updateStats();
        }
    </script>
</body>
</html>
